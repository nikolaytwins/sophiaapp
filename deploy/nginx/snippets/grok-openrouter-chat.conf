# Подключать из server {} (sites-available/twinworks): после блока /volky/
# URL: https://app.twinlabs.ru/grok/
# Прокси: systemd grok-openrouter-chat → 127.0.0.1:8766
# Доступ только после входа в Twinworks (тот же auth_request, что и для /).
# В location = /api/auth/check на сервере должны быть: proxy_pass_request_body off;
# Content-Length ""; client_max_body_size 32m; — иначе большой POST /grok/api/chat → 413/500.
#
# Важно: proxy_pass …8766/; — с завершающим слэшем, чтобы префикс /grok/ снялся и на бэкенд
# ушло /api/chat (а не /grok/api/chat → 404 у старых прокси). Без слэша прокси всё равно
# понимает /grok-префикс (см. canonical_request_path в openrouter_grok_proxy.py).

location = /grok {
    return 301 /grok/;
}

location /grok/ {
    auth_request /api/auth/check;
    auth_request_set $auth_status $upstream_status;
    error_page 401 = @redirect_login;

    client_max_body_size 32m;

    proxy_pass http://127.0.0.1:8766/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
    proxy_cache off;
}
