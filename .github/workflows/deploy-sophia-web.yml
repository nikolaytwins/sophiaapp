name: Deploy Sophia OS web

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'sophia-os/**'
      - '.github/workflows/deploy-sophia-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-sophia-web
  cancel-in-progress: false

defaults:
  run:
    working-directory: sophia-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sophia-os/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export static web
        run: npm run build:web
        env:
          CI: true
          EXPO_PUBLIC_ASTRO_API_URL: ${{ secrets.EXPO_PUBLIC_ASTRO_API_URL }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}

      - name: Rsync dist to server
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -p $PORT -o StrictHostKeyChecking=yes" \
            ./dist/ "${SERVER_USER}@${SERVER_HOST}:/var/www/sophia-os/dist/"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}
