# Статическая веб-сборка Sophia OS (Expo) — только артефакт dist для скачивания.
# Автодеплой на VPS: workflow deploy-sophia-web.yml (push в sophia-os).
# Этот workflow намеренно только вручную, чтобы не дублировать сборку при push.

name: Sophia OS — web export

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sophia-os

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sophia-os/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export static web
        run: npm run build:web
        env:
          CI: true
          EXPO_PUBLIC_SOPHIA_HABITS_API_BASE: ${{ secrets.EXPO_PUBLIC_SOPHIA_HABITS_API_BASE }}
          EXPO_PUBLIC_SOPHIA_HABITS_BEARER_TOKEN: ${{ secrets.EXPO_PUBLIC_SOPHIA_HABITS_BEARER_TOKEN }}

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sophia-os-web-dist
          path: sophia-os/dist
          if-no-files-found: error
