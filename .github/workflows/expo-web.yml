# Статическая веб-сборка Sophia OS (Expo) на раннере GitHub — без нагрузки на VPS.
# Артефакт: папка dist, её можно скачать из вкладки Actions или отдать на nginx.

name: Sophia OS — web export

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'sophia-os/**'
      - '.github/workflows/expo-web.yml'

defaults:
  run:
    working-directory: sophia-os

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sophia-os/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export static web
        run: npm run build:web
        env:
          CI: true

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sophia-os-web-dist
          path: sophia-os/dist
          if-no-files-found: error
