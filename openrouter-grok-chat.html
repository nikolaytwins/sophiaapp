<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenRouter — Grok чат</title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: #161a20;
      --border: #2a3140;
      --text: #e8eaef;
      --muted: #8b95a8;
      --accent: #3b82f6;
      --user: #1e3a5f;
      --assistant: #1a1f28;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    header label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
    header input, header select, header textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    header input[type="password"], header input[type="text"] { min-width: 220px; }
    .grow { flex: 1; min-width: 140px; }
    main {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 92%; }
    .msg.assistant { background: var(--assistant); border: 1px solid var(--border); align-self: flex-start; max-width: 100%; }
    .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    footer textarea {
      flex: 1;
      min-height: 72px;
      max-height: 400px;
      resize: vertical;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .note {
      font-size: 12px;
      color: var(--muted);
      padding: 0 16px 12px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      line-height: 1.45;
    }
    .err { color: #f87171; font-size: 13px; padding: 0 16px; max-width: 900px; margin: 0 auto; width: 100%; }
    .footer-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; }
    .footer-row textarea { flex: 1; }
    .btn-secondary {
      background: #374151;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }
    .attach-list { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; margin-bottom: 4px; min-height: 0; }
    .attach-chip {
      font-size: 12px;
      background: #2a3140;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
    }
    .attach-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-remove {
      cursor: pointer;
      color: var(--muted);
      border: none;
      background: none;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
    }
    .attach-remove:hover { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <div class="grow" id="apiKeyRow">
      <label for="apiKey">OpenRouter API key</label>
      <input id="apiKey" type="password" autocomplete="off" placeholder="sk-or-..." />
    </div>
    <div class="grow">
      <label for="model">Модель (актуальные id — на openrouter.ai/models, фильтр xAI)</label>
      <select id="model">
        <option value="x-ai/grok-4">x-ai/grok-4</option>
        <option value="x-ai/grok-4-fast">x-ai/grok-4-fast</option>
        <option value="x-ai/grok-4.1-fast">x-ai/grok-4.1-fast</option>
        <option value="x-ai/grok-4.20" selected>x-ai/grok-4.20 (флагман, если доступен в каталоге)</option>
        <option value="custom">Свой id…</option>
      </select>
      <input id="modelCustom" type="text" placeholder="x-ai/..." style="margin-top:8px; width:100%; display:none;" />
    </div>
    <div style="min-width:100px;">
      <label for="temperature">Temperature</label>
      <input id="temperature" type="number" step="0.1" min="0" max="2" value="0.7" style="width:100%;" />
    </div>
    <div style="min-width:120px;">
      <label for="maxTokens">max_tokens (пусто = по умолчанию API)</label>
      <input id="maxTokens" type="number" min="1" placeholder="—" style="width:100%;" />
    </div>
  </header>
  <div style="padding:12px 16px 0; max-width:900px; margin:0 auto; width:100%;">
    <label for="system" style="font-size:12px;color:var(--muted);">Системный промпт (опционально)</label>
    <textarea id="system" rows="4" style="width:100%; min-height:6rem; max-height:20rem; margin-top:4px; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px; resize:vertical;"></textarea>
  </div>
  <p class="note" id="note">
    Режим без прокси: ключ в браузере (localStorage), запрос напрямую на OpenRouter (нужен CORS).
    С прокси: <code>python3 openrouter_grok_proxy.py</code> — ключ на сервере. На Twinlabs: после входа —
    <a href="/grok/" style="color:var(--accent);">/grok/</a>
    · Вложения: несколько изображений, PDF и текстовых файлов за один запрос (модель видит все).
  </p>
  <p id="error" class="err" hidden></p>
  <main id="thread"></main>
  <footer>
    <input type="file" id="fileInput" multiple style="display: none" />
    <div id="attachList" class="attach-list" hidden></div>
    <div class="footer-row">
      <button type="button" id="attachBtn" class="btn-secondary">Файлы</button>
      <textarea id="input" placeholder="Сообщение… (Enter — отправить, Shift+Enter — новая строка)"></textarea>
      <button type="button" id="send">Отправить</button>
      <button type="button" id="stop" disabled>Стоп</button>
    </div>
  </footer>
  <script>
    const OR_URL = 'https://openrouter.ai/api/v1/chat/completions';
    const STORAGE_KEY = 'openrouter_api_key';

    const el = (id) => document.getElementById(id);
    const apiKeyRow = el('apiKeyRow');
    const apiKey = el('apiKey');
    const model = el('model');
    const modelCustom = el('modelCustom');
    const temperature = el('temperature');
    const maxTokens = el('maxTokens');
    const system = el('system');
    const thread = el('thread');
    const input = el('input');
    const sendBtn = el('send');
    const stopBtn = el('stop');
    const errorEl = el('error');
    const noteEl = el('note');
    const fileInput = el('fileInput');
    const attachBtn = el('attachBtn');
    const attachList = el('attachList');

    const MAX_ATTACH = 15;
    const MAX_BIN_BYTES = 25 * 1024 * 1024;
    const MAX_TEXT_BYTES = 1024 * 1024;
    const BUBBLE_USER_TEXT_PREVIEW = 8000;
    let stagedFiles = [];

    let messages = [];
    let abortController = null;
    let proxyMode = false;
    let chatUrl = OR_URL;

    /** Префикс при выкладке под https://app.twinlabs.ru/grok/ */
    function apiBase() {
      const p = window.location.pathname;
      if (p === '/grok' || p.startsWith('/grok/')) return '/grok';
      return '';
    }
    const API_BASE = apiBase();

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) apiKey.value = saved;

    apiKey.addEventListener('change', () => {
      localStorage.setItem(STORAGE_KEY, apiKey.value.trim());
    });

    model.addEventListener('change', () => {
      modelCustom.style.display = model.value === 'custom' ? 'block' : 'none';
    });

    function fillModelsFromApi(models, defaultId) {
      model.innerHTML = '';
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m.id;
        const ctx = m.context_length ? Math.round(m.context_length / 1000) + 'k ctx' : '';
        opt.textContent = (m.name || m.id) + (ctx ? ' · ' + ctx : '');
        model.appendChild(opt);
      }
      const optC = document.createElement('option');
      optC.value = 'custom';
      optC.textContent = 'Свой id…';
      model.appendChild(optC);
      if (models.some((x) => x.id === defaultId)) model.value = defaultId;
      else if (models[0]) model.value = models[0].id;
    }

    async function initProxy() {
      try {
        const r = await fetch(API_BASE + '/api/config');
        if (!r.ok) throw new Error('no config');
        const cfg = await r.json();
        proxyMode = true;
        chatUrl = API_BASE + '/api/chat';
        apiKeyRow.style.display = 'none';
        fillModelsFromApi(cfg.models || [], cfg.defaultModel || 'x-ai/grok-4.20');
        if (noteEl) {
          noteEl.textContent =
            'Прокси: ключ на сервере (auth-profiles). Список моделей с OpenRouter. По умолчанию: ' +
            (cfg.defaultModel || '') +
            '.';
        }
      } catch {
        proxyMode = false;
        chatUrl = OR_URL;
      }
    }
    initProxy();

    function renderAttachList() {
      attachList.innerHTML = '';
      if (!stagedFiles.length) {
        attachList.hidden = true;
        return;
      }
      attachList.hidden = false;
      stagedFiles.forEach((file) => {
        const chip = document.createElement('div');
        chip.className = 'attach-chip';
        const name = document.createElement('span');
        name.textContent = file.name + ' (' + Math.round(file.size / 1024) + ' КБ)';
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.className = 'attach-remove';
        rm.setAttribute('aria-label', 'Удалить');
        rm.textContent = '×';
        rm.addEventListener('click', () => {
          const i = stagedFiles.indexOf(file);
          if (i !== -1) stagedFiles.splice(i, 1);
          renderAttachList();
        });
        chip.appendChild(name);
        chip.appendChild(rm);
        attachList.appendChild(chip);
      });
    }

    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      for (const f of fileInput.files) {
        if (stagedFiles.length >= MAX_ATTACH) {
          showError('Не больше ' + MAX_ATTACH + ' вложений за раз.');
          break;
        }
        stagedFiles.push(f);
      }
      fileInput.value = '';
      renderAttachList();
      showError('');
    });

    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }

    function readAsText(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ''));
        r.onerror = () => reject(r.error);
        r.readAsText(file, 'UTF-8');
      });
    }

    function isTextLikeFile(file) {
      const mime = file.type || '';
      if (mime.startsWith('text/')) return true;
      const n = (file.name || '').toLowerCase();
      return /\.(txt|md|json|csv|xml|html?|css|js|mjs|cjs|ts|tsx|jsx|vue|py|rs|go|java|kt|swift|yml|yaml|log|sh|bash|zsh|toml|ini|sql|graphql|svg)$/i.test(
        n
      );
    }

    async function fileToContentPart(file) {
      const name = file.name || 'file';
      const mime = file.type || '';
      if (mime.startsWith('image/')) {
        if (file.size > MAX_BIN_BYTES) throw new Error(name + ': изображение > 25 МБ');
        const url = await readAsDataURL(file);
        return { type: 'image_url', image_url: { url } };
      }
      if (mime === 'application/pdf' || name.toLowerCase().endsWith('.pdf')) {
        if (file.size > MAX_BIN_BYTES) throw new Error(name + ': PDF > 25 МБ');
        // OpenRouter OpenAPI: поле file_data (snake_case), не fileData
        const file_data = await readAsDataURL(file);
        return { type: 'file', file: { filename: name, file_data } };
      }
      if (isTextLikeFile(file)) {
        if (file.size > MAX_TEXT_BYTES) throw new Error(name + ': текст > 1 МБ — разбейте файл');
        const body = await readAsText(file);
        return { type: 'text', text: '### Файл: `' + name + '`\n\n```\n' + body + '\n```\n' };
      }
      throw new Error(
        name + ': неподдерживаемый тип. Добавьте изображения, PDF или текстовые файлы (txt, md, json, код…).'
      );
    }

    function formatUserForBubble(content) {
      if (typeof content === 'string') return content;
      if (!Array.isArray(content)) return String(content);
      const texts = content.filter((p) => p.type === 'text').map((p) => p.text || '');
      const nImg = content.filter((p) => p.type === 'image_url').length;
      const nFile = content.filter((p) => p.type === 'file').length;
      let head = texts.join('\n').trim().slice(0, BUBBLE_USER_TEXT_PREVIEW);
      const badges = [];
      if (nImg) badges.push(nImg + ' изображ.');
      if (nFile) badges.push(nFile + ' PDF/файл');
      if (badges.length) head = (head ? head + '\n\n' : '') + '📎 ' + badges.join(', ');
      return head || '[вложения]';
    }

    function messagesContainPdf(messagesArr) {
      for (const m of messagesArr) {
        if (m.role !== 'user' || typeof m.content === 'string') continue;
        if (!Array.isArray(m.content)) continue;
        for (const p of m.content) {
          if (p.type !== 'file' || !p.file) continue;
          const fn = String(p.file.filename || '').toLowerCase();
          const fd = String(p.file.file_data || p.file.fileData || '');
          if (fn.endsWith('.pdf') || fd.startsWith('data:application/pdf')) return true;
        }
      }
      return false;
    }

    function showError(text) {
      if (!text) {
        errorEl.hidden = true;
        errorEl.textContent = '';
        return;
      }
      errorEl.hidden = false;
      errorEl.textContent = text;
    }

    function resolvedModel() {
      if (model.value === 'custom') return modelCustom.value.trim();
      return model.value;
    }

    function appendBubble(role, text, streaming) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const r = document.createElement('div');
      r.className = 'role';
      r.textContent = role === 'user' ? 'Вы' : 'Ассистент';
      const c = document.createElement('div');
      c.className = 'content';
      c.textContent = text || '';
      wrap.appendChild(r);
      wrap.appendChild(c);
      thread.appendChild(wrap);
      thread.scrollTop = thread.scrollHeight;
      return { wrap, c };
    }

    function buildPayload() {
      const m = resolvedModel();
      if (!m) throw new Error('Укажите модель.');
      const body = {
        model: m,
        messages: [],
        stream: true,
        temperature: Number(temperature.value) || 0.7,
      };
      const sys = system.value.trim();
      if (sys) body.messages.push({ role: 'system', content: sys });
      body.messages.push(...messages);
      const mt = maxTokens.value.trim();
      if (mt) body.max_tokens = Number(mt);
      if (messagesContainPdf(body.messages)) {
        body.plugins = [{ id: 'file-parser', pdf: { engine: 'cloudflare-ai' } }];
      }
      return body;
    }

    async function streamCompletion(attachRestore) {
      showError('');
      const key = apiKey.value.trim();
      if (!proxyMode && !key) {
        showError('Введите API key или откройте страницу через openrouter_grok_proxy.py.');
        return;
      }
      let payload;
      try {
        payload = buildPayload();
      } catch (e) {
        showError(e.message);
        return;
      }

      sendBtn.disabled = true;
      stopBtn.disabled = false;
      abortController = new AbortController();

      const lastUser = messages[messages.length - 1];
      appendBubble('user', formatUserForBubble(lastUser.content));
      const { c: assistantContent } = appendBubble('assistant', '', true);

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (!proxyMode) {
          headers.Authorization = 'Bearer ' + key;
          headers['HTTP-Referer'] = window.location.origin || 'http://localhost';
          headers['X-Title'] = 'OpenRouter Grok Chat';
        }
        const res = await fetch(chatUrl, {
          method: 'POST',
          headers,
          body: JSON.stringify(payload),
          signal: abortController.signal,
        });

        if (!res.ok) {
          const errText = await res.text();
          let msg = res.status + ' ' + res.statusText;
          try {
            const j = JSON.parse(errText);
            if (j.error?.message) msg = j.error.message;
          } catch (_) {}
          throw new Error(msg);
        }

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buffer = '';
        let full = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += dec.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            const s = line.trim();
            if (!s || s.startsWith(':')) continue;
            if (s === 'data: [DONE]') continue;
            if (!s.startsWith('data: ')) continue;
            const json = s.slice(6);
            let chunk;
            try {
              chunk = JSON.parse(json);
            } catch {
              continue;
            }
            const delta = chunk.choices?.[0]?.delta?.content;
            if (delta) {
              full += delta;
              assistantContent.textContent = full;
              thread.scrollTop = thread.scrollHeight;
            }
            const err = chunk.choices?.[0]?.error;
            if (err?.message) throw new Error(err.message);
          }
        }

        messages.push({ role: 'assistant', content: full });
      } catch (e) {
        if (e.name === 'AbortError') {
          assistantContent.textContent += '\n\n[прервано]';
        } else {
          showError(String(e.message || e));
          assistantContent.textContent = '[ошибка]';
          messages.pop();
          if (attachRestore && attachRestore.length) {
            stagedFiles = attachRestore;
            renderAttachList();
          }
        }
      } finally {
        sendBtn.disabled = false;
        stopBtn.disabled = true;
        abortController = null;
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text && !stagedFiles.length) return;
      const attachBackup = stagedFiles.length ? [...stagedFiles] : null;
      let userContent;
      try {
        if (!stagedFiles.length) {
          userContent = text;
        } else {
          const parts = [];
          if (text) parts.push({ type: 'text', text: text });
          else
            parts.push({
              type: 'text',
              text: 'Проанализируй все вложения: по каждому файлу — что важно; в конце — общий вывод.',
            });
          for (const f of stagedFiles) {
            parts.push(await fileToContentPart(f));
          }
          userContent = parts;
        }
      } catch (e) {
        showError(e.message || String(e));
        return;
      }
      stagedFiles = [];
      renderAttachList();
      input.value = '';
      messages.push({ role: 'user', content: userContent });
      await streamCompletion(attachBackup);
    }

    sendBtn.addEventListener('click', () => void send());
    stopBtn.addEventListener('click', () => abortController?.abort());

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        void send();
      }
    });
  </script>
</body>
</html>
