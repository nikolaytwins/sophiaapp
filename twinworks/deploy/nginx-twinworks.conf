# Twinworks — порт 80: главная под cookie-авторизацией (запоминание 90 дней), /pm-board без авторизации
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Проверка cookie для доступа к основной платформе (subrequest auth_request)
    location = /api/auth/check {
        internal;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location /login {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /pm-board {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /pm-board;
    }

    # Статика с VPS: GitHub Action «Deploy Volky static site» → /var/www/volky/
    # Должно быть ВЫШЕ location / (иначе запросы уйдут в Next с auth_request).
    location = /volky {
        return 301 /volky/;
    }

    location /volky/ {
        alias /var/www/volky/;
        index index.html;
    }

    location / {
        auth_request /api/auth/check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @redirect_login;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location @redirect_login {
        return 302 $scheme://$host/login?next=$request_uri;
    }
}
